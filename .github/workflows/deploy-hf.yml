name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push backend to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git subtree split --prefix=backend --branch hf-deploy
          git push https://lean-dev:$HF_TOKEN@huggingface.co/spaces/lean-dev/portfolio-chatbot hf-deploy:main --force
